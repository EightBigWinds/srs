name: update-srs

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Update rule-set
        run: |
          chmod +x scripts/update-cn-additional.sh
          ./scripts/update-cn-additional.sh

      - name: Commit changes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add sing-box/source/cn-additional-list.txt sing-box/source/cn-additional-list.json sing-box/srs/cn-additional-list.srs
          if git diff --cached --quiet; then
            echo no changes
            exit 0
          fi
          git commit -m "chore: update cn-additional srs"
          git push
